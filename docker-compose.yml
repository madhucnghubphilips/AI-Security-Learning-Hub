services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - ./Lab/Modelfile-ctf:/models/Modelfile-ctf:ro
      - ./docker/ollama/init-models.sh:/init-models.sh:ro
    command: ["/bin/sh", "/init-models.sh"]
    restart: "no"

  labs:
    build:
      context: .
      dockerfile: docker/labs/Dockerfile
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_LLM_MODEL: llama3.1
      OLLAMA_EMBED_MODEL: nomic-embed-text
    ports:
      - "8501:8501"
      - "8502:8502"
      - "8503:8503"
      - "8504:8504"
      - "8505:8505"
      - "8506:8506"
      - "8507:8507"
      - "8508:8508"
      - "8509:8509"
      - "8510:8510"

  chatbot:
    build:
      context: .
      dockerfile: docker/chatbot/Dockerfile
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      CTF_MODEL: dolphin-ctf:latest
    ports:
      - "8000:8000"

volumes:
  ollama-data:
