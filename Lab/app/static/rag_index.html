<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Philips Healthcare AI Assistant</title>
  <link rel="icon" href="data:,">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root,
    [data-theme="dark"] {
      --bg: #0d1117;
      --bg-elevated: #111827;
      --surface: #151d2b;
      --surface-soft: #1b2638;
      --surface-strong: #223047;
      --text: #f5f7fb;
      --text-muted: #aab5c8;
      --text-faint: #778397;
      --line: rgba(187, 211, 255, 0.14);
      --line-strong: rgba(121, 180, 255, 0.32);
      --accent: #2bb7ff;
      --accent-strong: #54d6ff;
      --accent-soft: rgba(43, 183, 255, 0.16);
      --success: #5ee6a8;
      --warning: #ffd166;
      --danger: #ff6b7a;
      --shadow: 0 18px 55px rgba(0, 0, 0, 0.32);
      --input-bg: #0f1724;
      --image-bg: linear-gradient(145deg, rgba(43, 183, 255, 0.15), rgba(94, 230, 168, 0.08));
    }

    [data-theme="light"] {
      --bg: #f4f8fb;
      --bg-elevated: #ffffff;
      --surface: #ffffff;
      --surface-soft: #eef5fa;
      --surface-strong: #dfeaf2;
      --text: #101827;
      --text-muted: #4f5f73;
      --text-faint: #718096;
      --line: rgba(33, 56, 82, 0.12);
      --line-strong: rgba(0, 116, 166, 0.26);
      --accent: #0073a8;
      --accent-strong: #005f8f;
      --accent-soft: rgba(0, 115, 168, 0.12);
      --success: #168a52;
      --warning: #9b6a00;
      --danger: #c83545;
      --shadow: 0 16px 45px rgba(31, 64, 88, 0.14);
      --input-bg: #ffffff;
      --image-bg: linear-gradient(145deg, rgba(0, 115, 168, 0.12), rgba(22, 138, 82, 0.08));
    }

    body {
      min-height: 100vh;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, Ubuntu, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 0.9375rem;
      line-height: 1.55;
      transition: background 0.2s ease, color 0.2s ease;
    }

    button, select, textarea { font: inherit; }

    .app-shell {
      min-height: 100vh;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(circle at top left, rgba(43, 183, 255, 0.16), transparent 34rem),
        radial-gradient(circle at bottom right, rgba(94, 230, 168, 0.1), transparent 30rem),
        var(--bg);
    }

    .topbar {
      height: 68px;
      padding: 0 26px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg-elevated) 84%, transparent);
      backdrop-filter: blur(16px);
      flex-shrink: 0;
      z-index: 10;
    }

    .brand-block { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .nav-avatar, .msg-avatar {
      width: 34px; height: 34px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #ffffff; font-size: 0.68rem; font-weight: 800;
      letter-spacing: 0.04em; flex-shrink: 0;
      background: linear-gradient(145deg, #006aa6, #19b7e8);
      box-shadow: 0 8px 24px rgba(25, 183, 232, 0.28);
    }
    .brand-copy { min-width: 0; }
    .nav-title {
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .topbar-actions { display: flex; align-items: center; gap: 10px; }
    .status-pill, .theme-toggle {
      border: 1px solid var(--line);
      background: var(--surface-soft);
      color: var(--text-muted);
      border-radius: 999px;
      height: 34px;
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      font-weight: 650;
      white-space: nowrap;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--success) 18%, transparent);
    }
    .theme-toggle { cursor: pointer; color: var(--text); }
    .theme-toggle:hover { border-color: var(--line-strong); }

    .workspace-shell {
      flex: 1;
      min-height: 0;
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 22px 22px 14px;
      display: grid;
      grid-template-columns: minmax(260px, 320px) minmax(0, 1fr);
      gap: 18px;
    }

    .mission-progress {
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      box-shadow: var(--shadow);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      overflow: auto;
    }

    .panel-kicker {
      color: var(--accent-strong);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .mission-heading {
      font-size: 1.22rem;
      line-height: 1.18;
      margin-top: 5px;
      letter-spacing: 0;
    }
    .mission-copy {
      color: var(--text-muted);
      font-size: 0.84rem;
      margin-top: 8px;
    }

    .controls-bar { display: contents; }
    .mode-controls { display: grid; gap: 12px; }
    .field-group { display: grid; gap: 6px; }
    .nav-label {
      font-size: 0.72rem;
      color: var(--text-faint);
      font-weight: 750;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      user-select: none;
    }
    .scenario-select {
      width: 100%;
      min-height: 42px;
      font-size: 0.88rem;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 11px;
      background: var(--input-bg);
      color: var(--text);
      cursor: pointer;
      outline: none;
    }
    .scenario-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .chat-column {
      min-width: 0;
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #chat-main {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 22px;
    }
    .messages-wrap {
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .msg-user { display: flex; justify-content: flex-end; margin-bottom: 18px; }
    .msg-user .content {
      max-width: min(640px, 86%);
      background: linear-gradient(145deg, var(--accent), var(--accent-strong));
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.94rem;
      color: #00131f;
      font-weight: 600;
      white-space: pre-wrap;
      word-break: break-word;
    }
    [data-theme="dark"] .msg-user .content { color: #03111b; }
    [data-theme="light"] .msg-user .content { color: #ffffff; }

    .msg-assistant {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 22px;
    }
    .msg-avatar {
      width: 32px;
      height: 32px;
      font-size: 0.62rem;
      margin-top: 2px;
    }
    .msg-assistant .content {
      flex: 1;
      min-width: 0;
      font-size: 0.94rem;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-left: 4px solid transparent;
      border-radius: 8px;
      background: var(--surface-soft);
    }
    .accent-pi  { border-left-color: #2bb7ff !important; }
    .accent-sd  { border-left-color: #ffbd4a !important; }
    .accent-oh  { border-left-color: #ff6580 !important; }
    .accent-mi  { border-left-color: #5ee6a8 !important; }

    .msg-assistant .content.error {
      color: var(--danger);
      background: color-mix(in srgb, var(--danger) 10%, var(--surface));
      border-color: color-mix(in srgb, var(--danger) 35%, var(--line));
    }
    .oh-unsanitized-badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 750;
      color: #5b3b00;
      background: #ffe8a3;
      border: 1px solid #ffd166;
      border-radius: 5px;
      padding: 3px 8px;
      margin-bottom: 8px;
    }

    .success-banner {
      max-width: 820px;
      margin: 0 auto 16px;
      background: color-mix(in srgb, var(--success) 14%, var(--surface));
      border: 1px solid color-mix(in srgb, var(--success) 45%, var(--line));
      border-radius: 8px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.86rem;
      color: var(--success);
      font-weight: 750;
      animation: slideIn 0.3s ease;
    }
    .success-banner .credential {
      font-family: monospace;
      font-weight: 800;
      background: color-mix(in srgb, var(--success) 16%, transparent);
      padding: 2px 7px;
      border-radius: 5px;
    }
    .mark-solved-btn {
      font-size: 0.8rem;
      background: color-mix(in srgb, var(--success) 12%, var(--surface));
      border: 1px solid color-mix(in srgb, var(--success) 45%, var(--line));
      color: var(--success);
      border-radius: 8px;
      padding: 6px 11px;
      cursor: pointer;
      margin-top: 6px;
      font-family: inherit;
      font-weight: 700;
    }
    .mark-solved-btn:hover { border-color: var(--success); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .typing { display: inline-flex; gap: 4px; align-items: center; padding: 4px 0; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
      animation: pulse 1.2s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 60%, 100% { transform: scale(1); opacity: 0.45; }
      30% { transform: scale(1.35); opacity: 1; }
    }

    .input-wrap {
      padding: 14px 18px 12px;
      background: color-mix(in srgb, var(--surface) 94%, transparent);
      border-top: 1px solid var(--line);
      flex-shrink: 0;
    }
    .input-box {
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--input-bg);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 11px 11px 15px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.12);
    }
    .input-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    #message-input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-family: inherit;
      font-size: 0.94rem;
      line-height: 1.6;
      color: var(--text);
      resize: none;
      max-height: 150px;
      overflow-y: auto;
    }
    #message-input::placeholder { color: var(--text-faint); }
    #send-btn {
      width: 38px; height: 38px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(145deg, var(--accent), var(--accent-strong));
      color: #06121b;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, opacity 0.15s;
    }
    #send-btn:hover:not(:disabled) { transform: translateY(-1px); }
    #send-btn:disabled { opacity: 0.38; cursor: not-allowed; }
    #send-btn svg { width: 17px; height: 17px; }
    .safety-note {
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-faint);
      margin: 8px 0 0;
    }

    #welcome {
      display: block;
      max-width: 920px;
      margin: 0 auto 24px;
      width: 100%;
    }
    #welcome.hidden { display: none; }
    .challenge-panel {
      display: grid;
      grid-template-columns: minmax(220px, 34%) minmax(0, 1fr);
      gap: 20px;
      align-items: stretch;
    }
    .device-stage {
      min-height: 280px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--image-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }
    .welcome-device-img {
      max-height: 220px;
      max-width: 100%;
      object-fit: contain;
      filter: drop-shadow(0 18px 34px rgba(0, 0, 0, 0.24));
    }
    .challenge-briefing {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-soft);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 13px;
    }
    .challenge-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }
    .welcome-heading {
      font-size: 1.5rem;
      line-height: 1.12;
      font-weight: 760;
      color: var(--text);
      letter-spacing: 0;
    }
    .welcome-sub {
      font-size: 0.88rem;
      color: var(--text-muted);
      margin-top: -5px;
    }
    .scenario-brief {
      font-size: 0.91rem;
      color: var(--text-muted);
      line-height: 1.65;
    }
    .find-statement {
      margin-top: 13px;
      padding: 12px 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--input-bg);
      font-size: 0.84rem;
      color: var(--text-muted);
    }
    .find-statement strong { color: var(--text); font-weight: 800; }
    .owasp-badge, .difficulty-badge, .complete-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--line-strong);
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-size: 0.73rem;
      font-weight: 800;
      padding: 5px 10px;
      border-radius: 999px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-decoration: none;
    }
    .owasp-badge:hover { border-color: var(--accent); }
    .difficulty-badge {
      color: var(--text-muted);
      background: var(--surface);
    }
    .complete-badge {
      color: var(--success);
      border-color: color-mix(in srgb, var(--success) 40%, var(--line));
      background: color-mix(in srgb, var(--success) 12%, transparent);
    }
    .diff-pips { display: inline-flex; gap: 4px; }
    .diff-pip {
      width: 8px;
      height: 8px;
      border-radius: 3px;
      background: var(--surface-strong);
    }
    .diff-pip.on { background: var(--accent); }

    .hint-toggle {
      align-self: flex-start;
      font-size: 0.82rem;
      color: var(--accent-strong);
      background: transparent;
      border: 1px solid var(--line);
      border-radius: 999px;
      cursor: pointer;
      font-family: inherit;
      padding: 7px 12px;
      font-weight: 750;
    }
    .hint-toggle:hover { border-color: var(--accent); }
    .hint-text {
      font-size: 0.86rem;
      color: var(--text);
      background: color-mix(in srgb, var(--warning) 12%, var(--surface));
      border: 1px solid color-mix(in srgb, var(--warning) 45%, var(--line));
      border-radius: 8px;
      padding: 10px 12px;
      display: none;
      text-align: left;
    }
    .hint-text.visible { display: block; }

    @media (max-width: 980px) {
      body { overflow: auto; height: auto; }
      .app-shell { min-height: 100vh; height: auto; }
      .topbar { height: auto; min-height: 64px; padding: 12px 16px; gap: 12px; align-items: flex-start; }
      .topbar-actions { flex-wrap: wrap; justify-content: flex-end; }
      .workspace-shell {
        grid-template-columns: 1fr;
        padding: 14px;
        min-height: auto;
      }
      .mission-progress { overflow: visible; }
      .chat-column { min-height: 70vh; }
      #chat-main { min-height: 52vh; }
      .challenge-panel { grid-template-columns: 1fr; }
      .device-stage { min-height: 210px; }
      .welcome-device-img { max-height: 170px; }
    }

    @media (max-width: 620px) {
      .topbar {
        flex-direction: column;
        align-items: stretch;
      }
      .topbar-actions { justify-content: space-between; }
      .status-pill, .theme-toggle { height: 32px; font-size: 0.74rem; padding: 0 10px; }
      .workspace-shell { padding: 10px; gap: 12px; }
      .mission-progress, .chat-column, .challenge-briefing, .device-stage { border-radius: 8px; }
      .mission-progress { padding: 14px; gap: 14px; }
      #chat-main { padding: 14px; }
      .input-wrap { padding: 12px; }
      .welcome-heading { font-size: 1.25rem; }
      .msg-user .content, .msg-assistant .content { max-width: 92%; font-size: 0.9rem; }
      .msg-assistant { gap: 9px; }
      .msg-avatar { width: 29px; height: 29px; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <nav class="topbar">
      <div class="brand-block">
        <span class="nav-avatar">PH</span>
        <div class="brand-copy">
          <div class="nav-title">Philips Healthcare AI Assistant</div>
        </div>
      </div>
      <div class="topbar-actions">
        <span class="status-pill"><span class="status-dot"></span>Local demo online</span>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="false" onclick="toggleTheme()">Light mode</button>
      </div>
    </nav>

    <div class="workspace-shell">
      <aside class="mission-progress">
        <div>
          <div class="panel-kicker">Mission Control</div>
          <h1 class="mission-heading">Healthcare AI security lab</h1>
          <p class="mission-copy">Pick an OWASP domain, probe the assistant, and track captured challenge outcomes.</p>
        </div>

        <div class="controls-bar" id="controls-bar">
          <div class="mode-controls">
            <label class="field-group">
              <span class="nav-label">Domain</span>
              <select id="ctf-category" class="scenario-select">
                <option value="pi">Prompt Injection &middot; LLM01</option>
                <option value="sd">Sensitive Data Disclosure &middot; LLM02</option>
                <option value="oh">Insecure Output Handling &middot; LLM05</option>
                <option value="mi">Misinformation &middot; LLM09</option>
              </select>
            </label>
            <label class="field-group">
              <span class="nav-label">Challenge</span>
              <select id="ctf-level" class="scenario-select">
                <option value="1">Challenge 1</option>
                <option value="2">Challenge 2</option>
                <option value="3">Challenge 3</option>
                <option value="4">Challenge 4</option>
              </select>
            </label>
          </div>
        </div>
      </aside>

      <section class="chat-column">
        <main id="chat-main">
          <div id="welcome"></div>
          <div class="messages-wrap" id="messages-wrap"></div>
        </main>

        <div class="input-wrap">
          <div class="input-box">
            <textarea id="message-input" placeholder="Message Philips Healthcare AI&hellip;" rows="1" autofocus></textarea>
            <button id="send-btn" onclick="sendMessage()" title="Send" aria-label="Send message">
              <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M8 13V3M8 3L4 7M8 3L12 7" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
          <p class="safety-note">AI responses may be inaccurate. This is a security training demo; do not enter real patient or system data.</p>
        </div>
      </section>
    </div>
  </div>

  <script>
    let scenario = 'pi_1';
    let history  = [];
    let isBusy   = false;
    const THEME_KEY = 'ctf_theme';

    function setTheme(theme) {
      const nextTheme = theme === 'light' ? 'light' : 'dark';
      document.documentElement.dataset.theme = nextTheme;
      localStorage.setItem(THEME_KEY, nextTheme);
      const btn = document.getElementById('theme-toggle');
      if (btn) {
        const isLight = nextTheme === 'light';
        btn.textContent = isLight ? 'Dark mode' : 'Light mode';
        btn.setAttribute('aria-pressed', String(isLight));
      }
    }

    function toggleTheme() {
      setTheme(document.documentElement.dataset.theme === 'light' ? 'dark' : 'light');
    }

    const OWASP_URLS = {
      pi: 'https://owasp.org/www-project-top-10-for-large-language-model-applications/#llm01',
      sd: 'https://owasp.org/www-project-top-10-for-large-language-model-applications/#llm02',
      oh: 'https://owasp.org/www-project-top-10-for-large-language-model-applications/#llm05',
      mi: 'https://owasp.org/www-project-top-10-for-large-language-model-applications/#llm09',
    };

    const DOMAIN_ACCENT = { pi: 'accent-pi', sd: 'accent-sd', oh: 'accent-oh', mi: 'accent-mi' };

    const WELCOME_IMG = {
      pi_1: '/assets/Azurion-7.png', pi_2: '/assets/Azurion-7.png',
      pi_3: '/assets/Azurion-7.png', pi_4: '/assets/Azurion-7.png',
      sd_1: '/assets/Ingenia Elition.png', sd_2: '/assets/Ingenia Elition.png',
      sd_3: '/assets/Ingenia Elition.png', sd_4: '/assets/Ingenia Elition.png',
    };

    const CTF_CHALLENGES = {
      pi_1: {
        name: 'Azurion Diagnostic Console',
        sub:  'Interventional Cardiology Lab 2 \u00b7 Apollo Hospitals Chennai',

    // ── Progress ─────────────────────────────────────────────────────────────
    function getProgress() {
      return JSON.parse(localStorage.getItem('ctf_progress') || '{}');
    }

    function markComplete(scen) {
      const p = getProgress();
      p[scen] = true;
      localStorage.setItem('ctf_progress', JSON.stringify(p));
      renderProgress();
      updateDropdownLabels();
    }

    function renderProgress() {
      updateDropdownLabels();
    }

    function updateDropdownLabels() {
      const levelSel = document.getElementById('ctf-level');
      Array.from(levelSel.options).forEach((opt, i) => {
        opt.text = `Challenge ${i + 1}`;
      });
    }

    // ── Scenario ─────────────────────────────────────────────────────────────
    function updateCtfScenario() {
      const cat   = document.getElementById('ctf-category').value;
      const level = document.getElementById('ctf-level').value;
      scenario = `${cat}_${level}`;
      updateDropdownLabels();
    }

    document.getElementById('ctf-category').addEventListener('change', () => {
      updateCtfScenario(); resetChat();
    });
    document.getElementById('ctf-level').addEventListener('change', () => {
      updateCtfScenario(); resetChat();
    });

    function resetChat() {
      history = [];
      document.getElementById('messages-wrap').innerHTML = '';
      const welcome = document.getElementById('welcome');
      welcome.classList.remove('hidden');
      renderWelcome();
    }

    // ── Welcome screen ────────────────────────────────────────────────────────
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderWelcome() {
      const welcome = document.getElementById('welcome');
      const c = CTF_CHALLENGES[scenario];
      if (!c) {
        welcome.innerHTML = `<h2 style="font-size:1.2rem;color:#111">Select a domain and challenge above to begin.</h2>`;
        return;
      }

      const p = getProgress();
      const imgSrc = WELCOME_IMG[scenario];
      const imgHtml = imgSrc
        ? `<img class="welcome-device-img" src="${imgSrc}" alt="${esc(c.name)}">`
        : `<div class="panel-kicker">Scenario Dataset</div>`;
      const pips = Array.from({length:4}, (_,i) =>
        `<span class="diff-pip${i < c.diff ? ' on' : ''}"></span>`).join('');
      const levelLabels = ['','Easy','Moderate','Medium','Hard'];
      const owaspUrl = OWASP_URLS[c.owaspCat] || '#';
      const solved = '';

      welcome.innerHTML = `
        <section class="challenge-panel">
          <div class="device-stage">${imgHtml}</div>
          <div class="challenge-briefing">
            <div class="challenge-meta">
              <a class="owasp-badge" href="${owaspUrl}" target="_blank" rel="noopener">${esc(c.owasp)} reference</a>
              <span class="difficulty-badge">Difficulty <span class="diff-pips">${pips}</span> ${levelLabels[c.diff]}</span>
              ${solved}
            </div>
            <h2 class="welcome-heading">${esc(c.name)}</h2>
            <p class="welcome-sub">${esc(c.sub)}</p>
            <div class="scenario-brief">
              ${esc(c.brief)}
              <p class="find-statement">Objective: <strong>${esc(c.find)}</strong></p>
            </div>
            <button class="hint-toggle" onclick="toggleHint(this)">Show hint</button>
            <div class="hint-text">Hint: ${esc(c.hint)}</div>
          </div>
        </section>`;
    }

    function toggleHint(btn) {
      const hint = btn.nextElementSibling;
      const visible = hint.classList.toggle('visible');
      btn.textContent = visible ? 'Hide hint' : 'Show hint';
    }

    function hideWelcome() {
      document.getElementById('welcome').classList.add('hidden');
    }

    // ── Helpers ──────────────────────────────────────────────────────────────
    function scrollToBottom() {
      document.getElementById('chat-main').scrollTop = document.getElementById('chat-main').scrollHeight;
    }

    function appendUserMessage(text) {
      const row = document.createElement('div');
      row.className = 'msg-user';
      const content = document.createElement('div');
      content.className = 'content';
      content.textContent = text;
      row.appendChild(content);
      document.getElementById('messages-wrap').appendChild(row);
      scrollToBottom();
    }

    function appendAssistantMessage() {
      const row = document.createElement('div');
      row.className = 'msg-assistant';
      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = 'PH';
      const content = document.createElement('div');
      const cat = scenario.split('_')[0];
      content.className = `content ${DOMAIN_ACCENT[cat] || ''}`;
      content.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
      row.appendChild(avatar);
      row.appendChild(content);
      document.getElementById('messages-wrap').appendChild(row);
      scrollToBottom();
      return content;
    }

    function showSuccessBanner(credential) {
      const wrap = document.getElementById('messages-wrap');
      const banner = document.createElement('div');
      banner.className = 'success-banner';
      banner.innerHTML = `<span>\u2713 Found:</span> <span class="credential">${esc(credential)}</span>`;
      wrap.appendChild(banner);
      scrollToBottom();
      setTimeout(() => banner.style.opacity = '0', 7000);
      setTimeout(() => banner.remove(), 7500);
    }

    function showMarkSolvedBtn(contentEl) {
      const btn = document.createElement('button');
      btn.className = 'mark-solved-btn';
      btn.textContent = 'Mark as solved \u2713';
      btn.onclick = () => { markComplete(scenario); btn.remove(); };
      contentEl.parentElement.appendChild(btn);
    }

    function setInputEnabled(enabled) {
      document.getElementById('message-input').disabled = !enabled;
      document.getElementById('send-btn').disabled = !enabled;
      isBusy = !enabled;
    }

    // ── Send ─────────────────────────────────────────────────────────────────
    async function sendMessage() {
      if (isBusy) return;
      const input = document.getElementById('message-input');
      const message = input.value.trim();
      if (!message) return;

      input.value = '';
      input.style.height = 'auto';
      setInputEnabled(false);

      const sentScenario = scenario;
      appendUserMessage(message);
      hideWelcome();
      const assistantContent = appendAssistantMessage();

      let fullResponse = '';
      let firstToken = true;

      try {
        const response = await fetch('/rag/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, scenario, history })
        });
        if (!response.ok) throw new Error('Server error: ' + response.status);

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const payload = line.slice(6);
            if (payload === '[DONE]') break;
            let parsed;
            try { parsed = JSON.parse(payload); } catch (_) { continue; }
            if (parsed.error) {
              assistantContent.classList.add('error');
              assistantContent.textContent = 'Error: ' + parsed.error;
              firstToken = false;
            } else if (parsed.token) {
              if (firstToken) { assistantContent.textContent = ''; firstToken = false; }
              fullResponse += parsed.token;
              assistantContent.textContent = fullResponse;
              scrollToBottom();
            }
          }
        }
      } catch (err) {
        assistantContent.classList.add('error');
        assistantContent.textContent = 'Error: ' + err.message;
        firstToken = false;
      }

      if (firstToken) assistantContent.textContent = '(no response)';

      // Output handling: render unsanitized HTML
      if (fullResponse && sentScenario.startsWith('oh_')) {
        assistantContent.style.whiteSpace = 'normal';
        assistantContent.innerHTML =
          '<span class="oh-unsanitized-badge">\u26a0\ufe0f Unsanitized output \u2014 rendered as raw HTML</span><br>' + fullResponse;
        showMarkSolvedBtn(assistantContent);
      }

      // Credential detection — auto-mark complete
      if (fullResponse) {
        const c = CTF_CHALLENGES[sentScenario];
        if (c && c.credential && fullResponse.includes(c.credential)) {
          markComplete(sentScenario);
          showSuccessBanner(c.credential);
        }
        // mi_ challenges: manual mark-as-solved after any response
        if (sentScenario.startsWith('mi_') && !getProgress()[sentScenario]) {
          showMarkSolvedBtn(assistantContent);
        }
        history.push({ role: 'user', content: message });
        history.push({ role: 'assistant', content: fullResponse });
      }

      setInputEnabled(true);
      document.getElementById('message-input').focus();
    }

    document.getElementById('message-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    document.getElementById('message-input').addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 150) + 'px';
    });

    // ── Init ─────────────────────────────────────────────────────────────────
    setTheme(localStorage.getItem(THEME_KEY) || document.documentElement.dataset.theme || 'dark');
    updateCtfScenario();
    renderProgress();
    renderWelcome();
  </script>
