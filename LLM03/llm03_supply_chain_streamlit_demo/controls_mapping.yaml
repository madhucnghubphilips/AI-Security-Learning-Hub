
controls:
  - id: LLM03-001
    name: Approved Component Allowlist
    description: Only approved packages, models, plugins, and prompt templates can be used.
  - id: LLM03-002
    name: Version Pinning
    description: Dependencies must use pinned versions to avoid unreviewed upgrades.
  - id: LLM03-003
    name: Integrity Verification
    description: Verify checksums or signatures before component usage.
  - id: LLM03-004
    name: Private Registry
    description: Prefer internal approved registries for dependencies and model artifacts.
  - id: LLM03-005
    name: SBOM Generation
    description: Generate and review SBOM for AI application components.
  - id: LLM03-006
    name: RAG Provenance
    description: Track source, owner, approval status, and timestamp for ingested knowledge.
  - id: LLM03-007
    name: Prompt Template Integrity
    description: Store prompts in version control and review prompt diffs.
  - id: LLM03-008
    name: Runtime Egress Restriction
    description: Restrict outbound traffic from LLM services to approved endpoints.
  - id: LLM03-009
    name: Secrets Isolation
    description: Do not expose production secrets directly to the LLM runtime.
  - id: LLM03-010
    name: Output Risk Detection
    description: Detect insecure recommendations, policy bypasses, and exfiltration patterns in model output.
